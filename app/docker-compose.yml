version: '3.8'

services:
  # Servicio Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11435:11434"  # Cambiado para evitar conflicto con Ollama local
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Para GPU (opcional, descomenta si tienes GPU NVIDIA)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Servicio de la aplicación Streamlit
  streamlit-app:
    build: .
    container_name: langchain-streamlit-app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://localhost:11434  # Internamente sigue siendo 11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
